<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />

    />
    <meta property="og:type" content="website" />
    <link rel="icon" type="image/svg+xml" href="/src/assets/bird-logo.svg" />

    />
    <title>Kevin F. Kidley - Fullstack Developer</title>
    <style>
      #font-loader {
        position: fixed;
        inset: 0;
        background: rgb(240, 240, 240);
        z-index: 9999;
        display: flex;
        align-items: center;
        justify-content: center;
        transition: opacity 0.5s ease;
      }
      #font-loader.fade-out {
        opacity: 0;
        pointer-events: none;
      }
      .fl-dots span {
        display: inline-block;
        width: 10px;
        height: 10px;
        margin: 0 4px;
        background: #000;
        animation: fl-blink 1s step-start infinite;
      }
      .fl-dots span:nth-child(2) { animation-delay: 0.33s; }
      .fl-dots span:nth-child(3) { animation-delay: 0.66s; }
      @keyframes fl-blink {
        0%, 100% { opacity: 1; }
        50%       { opacity: 0; }
      }
    </style>
  </head>
  <body>
    <div id="font-loader">
      <span class="fl-dots">
        <span></span><span></span><span></span>
      </span>
    </div>
    <div id="app"></div>
    <script type="module" src="/src/main.js"></script>
    <script>
      (function () {
        var el = document.getElementById('font-loader');
        if (!el) return;
        var timeout = new Promise(function (r) { setTimeout(r, 3000); });
        Promise.race([document.fonts.ready, timeout]).then(function () {
          el.classList.add('fade-out');
          el.addEventListener('transitionend', function () { el.remove(); }, { once: true });
        });
      })();
    </script>
  </body>
</html>
